<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>桂涛的个人空间</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --primary: #7c3aed;
            --secondary: #10b981;
            --surface: rgba(255, 255, 255, 0.9);
            --background: #f8f9fa;
            --text: #2c3e50;
            --shadow: 0 4px 12px rgba(0, 0, 0, 0.1);
            --radius: 16px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            font-family: Arial, sans-serif;
            background: var(--background);
            color: var(--text);
            margin: 0;
            padding: 0;
        }

        .grid-system {
            display: grid;
            gap: 2rem;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            padding: 2rem 0;
        }

        .content-block {
            background: var(--surface);
            backdrop-filter: blur(10px);
            border-radius: var(--radius);
            padding: 2rem;
            box-shadow: var(--shadow);
            transition: var(--transition);
            border: 1px solid rgba(0, 0, 0, 0.05);
        }

        .content-block:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
        }

        .feature-block {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            padding: 3rem;
            border-radius: var(--radius);
            position: relative;
            overflow: hidden;
        }

        .info-card {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            padding: 2rem;
            background: white;
            border-radius: var(--radius);
            border-left: 4px solid var(--primary);
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
        }

        .gallery-item {
            aspect-ratio: 1;
            background: var(--surface);
            border-radius: var(--radius);
            overflow: hidden;
            transition: var(--transition);
        }

        .gallery-item:hover {
            transform: scale(1.05);
        }

        /* 新增的导航栏样式 */
        .navbar {
            display: flex;
            align-items: center;
            background-color: #1a1a1a;
            color: white;
            padding: 10px 20px;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .navbar .logo {
            margin-right: 20px;
            font-size: 24px;
            font-weight: bold;
        }

        .navbar .nav-links {
            display: flex;
            gap: 20px;
            flex-grow: 1;
        }

        .navbar .nav-links a {
            color: white;
            text-decoration: none;
            font-size: 16px;
        }

        .navbar .nav-links a:hover {
            text-decoration: underline;
        }

        .navbar .new-badge {
            background-color: #007bff;
            color: white;
            border-radius: 50%;
            padding: 5px 10px;
            font-size: 12px;
            margin-left: 10px;
        }
    </style>
</head>
<body>
    <div id="navbar-container"></div>
    <script>
        window.addEventListener('DOMContentLoaded', function() {
            fetch('navbar.html')
                .then(response => response.text())
                .then(data => {
                    document.getElementById('navbar-container').innerHTML = data;
                })
                .catch(error => console.error('Error loading navbar:', error));
        });
    </script>

    <main class="grid-system" style="padding: 0 2rem;">
        <section class="feature-block">
            <h1>代码即艺术</h1>
            <p>用技术创造优雅解决方案</p>
            <div class="gallery-grid" style="margin-top: 2rem;">
                <div class="gallery-item"></div>
                <div class="gallery-item"></div>
                <div class="gallery-item"></div>
            </div>
        </section>

        <div class="grid-system">
            <div class="content-block">
                <h2>技术栈</h2>
                <div class="grid-system">
                    <div class="info-card">
                        <i class="fab fa-react fa-2x"></i>
                        <h3>前端架构</h3>
                        <p>React/Next.js 生态体系</p>
                    </div>
                    <div class="info-card">
                        <i class="fas fa-server fa-2x"></i>
                        <h3>后端技术</h3>
                        <p>Node.js + Golang 解决方案</p>
                    </div>
                </div>
            </div>

            <div class="content-block">
                <h2>最近动态</h2>
                <div class="info-card">
                    <time>2024.03.15</time>
                    <p>发布新的开源项目：AI 工作流引擎</p>
                    <a href="#" class="content-block">查看详情 →</a>
                </div>
            </div>
        </div>
    </main>

    <section class="feature-block" style="margin-top: 4rem;">
        <div class="grid-system">
            <div class="info-card" style="background: rgba(255,255,255,0.9);">
                <h2>三维作品集</h2>
                <p>使用Three.js创建的交互式展示</p>
                <div class="gallery-grid">
                    <div class="gallery-item"></div>
                    <div class="gallery-item"></div>
                    <div class="gallery-item"></div>
                </div>
            </div>
        </div>
    </section>
</body>
</html>
