<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>桂涛的个人网站</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --secondary-color: #3498db;
            --background: #f8f9fa;
            --text-color: #333;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            line-height: 1.6;
            background: var(--background);
            color: var(--text-color);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* 导航栏 */
        .navbar {
            background: white;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            padding: 1rem 0;
            position: sticky;
            top: 0;
        }

        .nav-links {
            display: flex;
            gap: 2rem;
            list-style: none;
        }

        .nav-link {
            color: var(--primary-color);
            text-decoration: none;
            padding: 0.5rem 1rem;
            border-radius: 4px;
            transition: all 0.3s ease;
        }

        .nav-link:hover {
            background: var(--secondary-color);
            color: white;
        }

        /* 博客列表 */
        .blog-section {
            margin: 3rem 0;
        }

        .blog-list {
            display: grid;
            gap: 1.5rem;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
        }

        .blog-card {
            background: white;
            padding: 1.5rem;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            transition: transform 0.3s ease;
        }

        .blog-card:hover {
            transform: translateY(-5px);
        }

        /* GitHub Pages说明 */
        .github-pages-section {
            background: var(--primary-color);
            color: white;
            padding: 3rem 0;
            margin-top: 3rem;
        }

        .info-box {
            background: rgba(255,255,255,0.1);
            padding: 1.5rem;
            border-radius: 8px;
            margin: 1rem 0;
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            .nav-links {
                flex-direction: column;
                gap: 1rem;
            }
            
            .blog-list {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <ul class="nav-links">
                <li><a href="#home" class="nav-link">我的介绍</a></li>
                <li><a href="#blog" class="nav-link">博客</a></li>
                <li><a href="#dev" class="nav-link">生活记录</a></li>
                <li><a href="#research" class="nav-link">杂七杂八的研究</a></li>
                <li><a href="#anime" class="nav-link">二次元</a></li>
            </ul>
        </div>
    </nav>

    <main class="container">
        <section class="blog-section">
            <h2>最新博客</h2>
            <div class="blog-list">
                <article class="blog-card">
                    <h3> OBS 直播</h3>
                    <p>OBS Studio的完整配置指南</p>
                </article>
                <article class="blog-card">
                    <h3>Markdown 语法学习 精简版</h3>
                    <p>10分钟掌握Markdown核心语法</p>
                </article>
                <!-- 更多博客条目... -->
            </div>
        </section>

        <section class="github-pages-section">
			<div class="container">
				<div class="info-box">
					<a href="https://pages.github.com" target="_blank" class="guide-title-link">
						<h2>GitHub Pages 指南</h2>
					</a>
					<p>免费、稳定、支持全球CDN加速的静态网站托管方案</p>
					<ul class="guide-features">
						<li><i class="fas fa-check"></i> 用户网站：username.github.io</li>
						<li><i class="fas fa-check"></i> 项目网站：username.github.io/repository</li>
					</ul>
				</div>
			</div>
		</section>
    </main>

    <footer style="background: var(--primary-color); color: white; padding: 2rem; margin-top: 3rem;">
        <div class="container">
            <p>© 2025 桂涛的个人网站 · 由 GitHub Pages 驱动</p>
            <p>联系方式：3341328441@qq.com</p>
        </div>
    </footer>
</body>

<head>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <!-- 内容 -->
    <script src="script.js"></script>
</body>
</html>
