<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>我的生活足迹</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="navbar-container"></div>
    
    <h1>我的第一个标题</h1>
    <p>第一个段落</p>
    <a href="https://www.runoob.com">菜鸟教程官网</a>
    <h3>三级标题</h3>
    <img src="https://img2.baidu.com/it/u=2620377681,912957102&fm=253&fmt=auto&app=138&f=JPEG?w=764&h=500" width="258" height="139" />
    
    <script>
        window.addEventListener('DOMContentLoaded', function() {
            fetch('navbar.html')
                .then(response => response.text())
                .then(data => {
                    document.getElementById('navbar-container').innerHTML = data;
                })
                .catch(error => console.error('Error loading navbar:', error));
        });
    </script>
</body>
</html>
